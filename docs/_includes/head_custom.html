<!-- PWA metadata -->
<link rel="manifest" href="{{ '/manifest.webmanifest' | relative_url }}">
<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/icons/apple-touch-icon.png' | relative_url }}">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="UHCR Docs">

<!-- Custom fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>
  window.__UHCR_BASE = "{{ '/' | relative_url }}";
  window.__UHCR_SW_PATH = window.__UHCR_BASE + 'sw.js';
</script>

<!-- Custom CSS -->
<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

<!-- Custom JavaScript -->
<script src="{{ '/assets/js/custom.js' | relative_url }}" defer></script>
<script src="{{ '/assets/js/animations.js' | relative_url }}" defer></script>
<script>
  // Initialize theme on page load
  (function() {
    const theme = localStorage.getItem('theme') || 'light';
    if (theme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>
