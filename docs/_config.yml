title: UHCR Documentation
description: Universal Hardware-Aware Compute Runtime — High-performance JIT compilation for Python

remote_theme: just-the-docs/just-the-docs@v0.8.2

baseurl: /UHCR
url: https://vishveshjoshi89.github.io

markdown: kramdown
highlighter: rouge
color_scheme: light

# Callouts
callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

# Navigation
nav_enabled: true
nav_sort: false
nav:
  - title: Home
    url: /
  - title: Guides
    items:
      - title: Quick Start
        url: /quickstart/
      - title: JIT Guide
        url: /jit-guide/
      - title: Plugin Guide
        url: /plugin-guide/
      - title: How UHCR Works
        url: /how-uhcr-works/
      - title: Contributing
        url: /contributing/
  - title: Reference
    items:
      - title: Architecture
        url: /architecture/
      - title: Hardware Detection
        url: /hardware-reference/
      - title: Optimization Passes
        url: /optimization-passes/
      - title: Storage
        url: /storage/
      - title: Network
        url: /network/
      - title: Runtime
        url: /runtime/
      - title: Containerization
        url: /containerization/
      - title: API Reference
        url: /api-reference/
      - title: Benchmarks
        url: /benchmarks/
      - title: Plugin System
        url: /plugins/
      - title: Multi-ISA
        url: /multi-isa/
  - title: Features
    url: /features/

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true

# Heading anchors
heading_anchors: true

# Aux links
aux_links:
  "GitHub Repository":
    - "https://github.com/VishveshJoshi89/UHCR"
  "PyPI Package":
    - "https://pypi.org/project/uhcr/"

aux_links_new_tab: true

# Footer
footer_content: 'Copyright &copy; <span id="year">2026</span> Vishvesh Joshi. Licensed under the <a href="https://github.com/VishveshJoshi89/UHCR/blob/uhcr-v1/LICENSE.txt" target="_blank" rel="noopener noreferrer">Apache-2.0 License</a>.'

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Exclude from processing
exclude:
  - node_modules/
  - vendor/
  - Gemfile
  - Gemfile.lock
  - README.md

# SCSS compilation
sass:
  style: compressed

# Theme plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
